name: deployment

services:
  organization_db:
    image: postgres:18-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ostock_dev
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./compose/organization/:/docker-entrypoint-initdb.d/
    networks:
      - organization
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 15s
      timeout: 5s
      retries: 10
  licensing_db:
    image: postgres:18-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "25432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ostock_dev
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./compose/licensing/:/docker-entrypoint-initdb.d/
    networks:
      - licensing
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 15s
      timeout: 5s
      retries: 10
  keycloak_db:
    image: postgres:18-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "35432:5432"
    environment:
      - POSTGRES_USER=keycloak
      - POSTGRES_DB=keycloak
      - POSTGRES_PASSWORD=keycloak
    volumes:
      - keycloak_data:/var/lib/postgresql
    networks:
      - keycloak
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak" ]
      interval: 1s
      timeout: 2s
      retries: 15
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    deploy:
      resources:
        limits:
          memory: 512M
    command: start-dev
    depends_on:
      keycloak_db:
        condition: service_healthy
    ports:
      - "8082:8080"
    networks:
      - keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
  kafka:
    image: apache/kafka:4.1.2
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - "29092:29092"
    networks:
      - kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 12
  config-service:
    image: ostock/config-server:1.0.0-SNAPSHOT
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - "8071:8071"
    networks:
      - config
    environment:
      THC_PATH: /actuator/health
      THC_PORT: "8071"
    healthcheck:
      test: [ "CMD", "/workspace/health-check" ]
      interval: 5s
      timeout: 5s
      retries: 12
  eurekaserver:
    image: ostock/eureka-server:0.0.1-SNAPSHOT
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - "8070:8070"
    depends_on:
      config-service:
        condition: service_healthy
    networks:
      - config
      - eureka
    environment:
      spring.profiles.active: "docker"
  organization-service:
    image: ostock/organization-service:0.0.1-SNAPSHOT
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-service:
        condition: service_healthy
      organization_db:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - organization
      - config
      - eureka
      - keycloak
      - kafka
    environment:
      spring.profiles.active: "docker"
  licensing-service:
    image: ostock/licensing-service:0.0.1-SNAPSHOT
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-service:
        condition: service_healthy
      licensing_db:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - licensing
      - config
      - eureka
      - keycloak
      - kafka
    environment:
      spring.profiles.active: "docker"
  gateway:
    image: ostock/gateway:0.0.1-SNAPSHOT
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      config-service:
        condition: service_healthy
      eurekaserver:
        condition: service_started
      organization-service:
        condition: service_started
      licensing-service:
        condition: service_started
    ports:
      - "8072:8072"
    networks:
      - config
      - eureka
    environment:
      spring.profiles.active: "docker"

networks:
  config:
  eureka:
  organization:
  licensing:
  keycloak:
  kafka:

volumes:
  keycloak_data:
    name: deployment_keycloak_data

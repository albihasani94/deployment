name: deployment

services:
  database:
    image: postgres:17-alpine
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ostock_dev
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./compose/:/docker-entrypoint-initdb.d/
    networks:
      - licensing
  config-service:
    image: ostock/config-server:0.0.1-SNAPSHOT
    ports:
      - "8071:8071"
    networks:
      - config
    healthcheck:
      test: "wget -T5 -qO- http://localhost:8071/actuator/health | grep UP || exit 1"
      interval: 3s
      timeout: 3s
      retries: 3
  licensing-service:
    image: ostock/licensing-service:0.0.1-SNAPSHOT
    depends_on:
      config-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - licensing
      - config
    environment:
      spring.profiles.active: "docker"

networks:
  licensing:
  config:
name: deployment

x-log-aggregation: &log-aggregation
  driver: fluentd
  options:
    fluentd-address: "127.0.0.1:24224"
    fluentd-async: "true"
    fluentd-sub-second-precision: "true"
    tag: "{{.Name}}"

services:
  organization_db:
    image: postgres:18-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ostock_dev
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./compose/organization/:/docker-entrypoint-initdb.d/
    networks:
      - organization
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 5s
      retries: 10
  licensing_db:
    image: postgres:18-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "25432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ostock_dev
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./compose/licensing/:/docker-entrypoint-initdb.d/
    networks:
      - licensing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 5s
      retries: 10
  keycloak_db:
    image: postgres:18-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "35432:5432"
    environment:
      - POSTGRES_USER=keycloak
      - POSTGRES_DB=keycloak
      - POSTGRES_PASSWORD=keycloak
    volumes:
      - keycloak_data:/var/lib/postgresql
    networks:
      - keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 1s
      timeout: 2s
      retries: 15
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    deploy:
      resources:
        limits:
          memory: 512M
    command: start-dev
    depends_on:
      keycloak_db:
        condition: service_healthy
    ports:
      - "8082:8080"
    networks:
      - keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
  kafka:
    image: apache/kafka:4.1.2
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - "29092:29092"
    networks:
      - kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    networks:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "true"
  redis:
    image: redis:8.6.2-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "6379:6379"
    networks:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "16686:16686"
    networks:
      - observability
  otel-collector:
    image: otel/opentelemetry-collector:0.152.0
    command: ["--config=/etc/otelcol/config.yml"]
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      jaeger:
        condition: service_started
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./compose/otel-collector/config.yml:/etc/otelcol/config.yml:ro
    networks:
      - observability
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.1
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.license.self_generated.type: basic
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - observability
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
  logstash:
    image: docker.elastic.co/logstash/logstash:9.4.1
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5000:5000"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xms384m -Xmx384m"
      XPACK_MONITORING_ENABLED: "false"
    volumes:
      - ./compose/logstash/pipeline/:/usr/share/logstash/pipeline/:ro
    networks:
      - observability
  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:5.0.5
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      logstash:
        condition: service_started
    ports:
      - "24224:24224"
    volumes:
      - ./compose/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./compose/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    networks:
      - observability
  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.1
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      NODE_OPTIONS: "--max-old-space-size=768"
      XPACK_SECURITY_ENABLED: "false"
    networks:
      - observability
  config-service:
    image: ostock/config-server:1.0.0-SNAPSHOT
    logging: *log-aggregation
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      fluent-bit:
        condition: service_started
    ports:
      - "8071:8071"
    networks:
      - config
      - observability
    environment:
      THC_PATH: /actuator/health
      THC_PORT: "8071"
      spring.profiles.active: "docker"
    healthcheck:
      test: ["CMD", "/workspace/health-check"]
      interval: 5s
      timeout: 5s
      retries: 12
  eurekaserver:
    image: ostock/eureka-server:1.0.0-SNAPSHOT
    logging: *log-aggregation
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "8070:8070"
    depends_on:
      config-service:
        condition: service_healthy
      otel-collector:
        condition: service_started
      fluent-bit:
        condition: service_started
    networks:
      - config
      - eureka
      - observability
    environment:
      spring.profiles.active: "docker"
  organization-service:
    image: ostock/organization-service:0.0.1-SNAPSHOT
    logging: *log-aggregation
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      config-service:
        condition: service_healthy
      organization_db:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
      fluent-bit:
        condition: service_started
    ports:
      - "8081:8081"
    networks:
      - organization
      - config
      - eureka
      - keycloak
      - kafka
      - observability
    environment:
      spring.profiles.active: "docker"
  licensing-service:
    image: ostock/licensing-service:0.0.1-SNAPSHOT
    logging: *log-aggregation
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      config-service:
        condition: service_healthy
      licensing_db:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      fluent-bit:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - licensing
      - config
      - eureka
      - keycloak
      - kafka
      - redis
      - observability
    environment:
      spring.profiles.active: "docker"
  gateway:
    image: ostock/gateway:0.0.1-SNAPSHOT
    logging: *log-aggregation
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      config-service:
        condition: service_healthy
      eurekaserver:
        condition: service_started
      organization-service:
        condition: service_started
      licensing-service:
        condition: service_started
      otel-collector:
        condition: service_started
      fluent-bit:
        condition: service_started
    ports:
      - "8072:8072"
    networks:
      - config
      - eureka
      - observability
    environment:
      spring.profiles.active: "docker"
  prometheus:
    image: prom/prometheus:v3.11.3
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "9090:9090"
    volumes:
      - ./compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - observability

networks:
  config:
  eureka:
  organization:
  licensing:
  keycloak:
  kafka:
  redis:
  observability:

volumes:
  keycloak_data:
    name: deployment_keycloak_data
  kafka_data:
    name: deployment_kafka_broker_data
  elasticsearch_data:
    name: deployment_elasticsearch_data

name: deployment-redis

services:
  redis:
    image: redis:8.6.2-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "6379:6379"
    networks:
      - redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  redis:

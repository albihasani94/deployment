name: deployment-local

services:
  keycloak_db:
    image: postgres:18-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "35432:5432"
    environment:
      - POSTGRES_USER=keycloak
      - POSTGRES_DB=keycloak
      - POSTGRES_PASSWORD=keycloak
    volumes:
      - keycloak_data:/var/lib/postgresql
    networks:
      - keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 1s
      timeout: 2s
      retries: 15

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    deploy:
      resources:
        limits:
          memory: 512M
    command: start-dev
    depends_on:
      keycloak_db:
        condition: service_healthy
    ports:
      - "8082:8080"
    networks:
      - keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

  kafka:
    image: apache/kafka:4.1.2
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - "29092:29092"
    networks:
      - kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 12

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    networks:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "true"

  redis:
    image: redis:8.6.2-alpine
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
      - "6379:6379"
    networks:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  keycloak:
  kafka:
  redis:

volumes:
  keycloak_data:
    name: deployment_keycloak_data
  kafka_data:
    name: deployment_kafka_broker_data

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: spring-boot-docker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - licensing-service:8080
        labels:
          service: licensing-service

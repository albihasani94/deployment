[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name   forward
    Listen 0.0.0.0
    Port   24224

[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       spring_boot_json
    Reserve_Data On
    Preserve_Key Off

[OUTPUT]
    Name   tcp
    Match  *
    Host   logstash
    Port   5000
    Format json_lines

info:
  name: admin auth
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:8082/realms/spring-microservices/protocol/openid-connect/token
  body:
    type: form-urlencoded
    data:
      - name: grant_type
        value: password
      - name: client_id
        value: ostock
      - name: client_secret
        value: 1mderCQBoJq3jsmrB7zyQ4ZTrULioZQk
      - name: username
        value: admin@ostock.com
      - name: password
        value: password

runtime:
  scripts:
    - type: after-response
      code: |-
        bru.setVar("admin_token", res.body.access_token);
        bru.setVar("admin_token_expires_at", Date.now() + (res.body.expires_in * 1000));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

opencollection: 1.0.0

info:
  name: spring-microservices-in-action
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  scripts:
    - type: before-request
      code: |-
        if (req.getAuthMode() === "bearer" && (!bru.getVar("admin_token") || Date.now() >= Number(bru.getVar("admin_token_expires_at")))) {
          await bru.runRequest("keycloak/admin auth");
        }
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
